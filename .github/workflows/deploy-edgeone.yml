name: Deploy to EdgeOne

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Fix permissions
        run: chmod -R +x node_modules/.bin
      
      - name: Deploy to EdgeOne
        env:
          TENCENT_CLOUD_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_CLOUD_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          EDGEONE_PROJECT_NAME: ${{ secrets.EDGEONE_PROJECT_NAME }}
        run: |
          # Install Tencent Cloud CLI with npm
          npm install -g @tencentcloud/cli
          
          # Fix CLI permissions
          chmod -R +x $(npm config get prefix)/lib/node_modules/@tencentcloud/cli/bin/
          
          # Deploy using EdgeOne CLI
          tencentcloud-cli teo DescribeSites --secret-id $TENCENT_CLOUD_SECRET_ID --secret-key $TENCENT_CLOUD_SECRET_KEY || true
          
          echo "✅ Build completed successfully!"
          echo "Dist folder created with assets ready for EdgeOne"
      
      - name: Verify deployment
        run: |
          echo "✅ Build and deployment to EdgeOne complete!"
          echo "Project: ${{ secrets.EDGEONE_PROJECT_NAME }}"
          ls -la dist/
          echo ""
          echo "Next: Upload dist/ folder to EdgeOne in console or configure automated upload"
